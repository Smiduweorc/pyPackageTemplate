# Git hooks managed by lefthook (https://lefthook.dev), installed as a dev
# dependency. After `pip install -e ".[dev]"`, run `lefthook install` once
# inside the git repository to wire the hooks up. YAML requires spaces for
# indentation (no tabs).
pre-commit:
    parallel: true
    commands:
        ruff-lint:
            glob: "*.py"
            run: ruff check {staged_files}
        ruff-format:
            glob: "*.py"
            run: ruff format --check {staged_files}
        mypy:
            glob: "*.py"
            # mypy resolves the package from pyproject ([tool.mypy] files),
            # so it type-checks the whole package rather than staged files.
            run: mypy

commit-msg:
    commands:
        # Validate the message against Conventional Commits without pulling in
        # a Node toolchain (no commitlint). lefthook passes the commit message
        # file as {1}; we check only its first line.
        conventional:
            run: |
                head -1 {1} | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+' || {
                    echo "Commit message must follow Conventional Commits, e.g. 'feat: add greeting helper'." >&2
                    echo "See https://www.conventionalcommits.org" >&2
                    exit 1
                }
